胡不直使彼以死生爲一條
胡人不敢南下而牧馬
化其萬物而不知其禪之者
花消英氣
喚取紅巾翠袖
黃帝將見大隗乎具茨之山
黃帝立爲天子十九年
黃帝順下風膝行而進
