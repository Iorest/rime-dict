或使汝眼睜睜看我死
或謂孔子於衛主癰疽
或爲之紀而莫見其形
及奔逸絕塵而回瞠若乎後者
即彼成我敗所由判也
既得志則縱情以傲物
幾翻離合
寄蜉蝣於天地
幾何僥倖而不喪人之國乎
汲汲然唯恐其似己也
季康子問政於孔子曰
記來時嘗與鴛鴦爲侶
寂寞梧桐深院鎖清秋
及其得柘棘枳枸之間也
季氏使閔子騫爲費宰
計四海之在天地之間也
及太尉自涇州以司農徵
寄我江南春色一枝梅
機心存於胸中則純白不備
紀信等四人持劍盾步走
既已知吾知之而問我
即欲乘便以此行之事語汝
記於郾城觀公孫氏舞劍器
計中國之在海內不似
家祭毋忘告乃翁
加汝肩尻乎雕俎之上
家事國事天下事事事關心
奸官污吏虐民可以死
建康中秋爲呂叔潛賦
見所嘗見於國中者喜
見一丈人方將爲圃畦
將比今之諸侯而誅之乎
將惡乎託業以及此言邪
江海之所以能爲百谷王者
將求名而能自要者而猶若是
將妄鑿垣牆而殖蓬蒿也
姜西溟言別賦此贈之
將有作則思知止以安人
將與國君同食以終其身
將子有凍餒之患而爲此乎
將子之春秋故及此乎
椒措如也
交戟之衛士欲止不內
教然後知困
皆能以朝諸侯有天下
解獸之羣而鳥皆夜鳴
