蘧伯玉行年六十而六十化
驅飛廉於海隅而戮之
瞿鵲子問乎長梧子曰
曲士不可以語於道者
去則窮日之力而後宿哉
屈折禮樂以匡天下之形
犬子以田產未置止我
確乎能其事者而已矣
然不自意能先入關破秦
