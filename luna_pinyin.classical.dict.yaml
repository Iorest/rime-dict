是以聖人處無爲之事
是以聖人和之以是非而休乎天鈞
是以聖人後其身而身先
是以聖人爲腹不爲目
是以十九年而刀刃若新發於硎
是以天下樂推而不厭
是以萬物莫不尊道而貴德
是以未嘗聞任氏之風俗
