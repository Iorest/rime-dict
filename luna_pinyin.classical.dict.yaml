惟別而已矣
爲不善乎顯明之中者
爲不善乎幽間之中者
唯不飲酒不茹葷者數月矣
未嘗敢飲食君之酒肉
未嘗見材如此其美也
爲陳同父賦壯語以寄
惟大人爲能格君心之非
謂洞
謂伐之與不伐亂人也者
