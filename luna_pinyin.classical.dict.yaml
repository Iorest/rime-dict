其知適足以知人之過
其治一也
其知之也似不知之也
其中有名有姓藏之名山者
其諸異乎人之求之與
其自任以天下之重如此
其自任以天下之重也
千門萬戶日童日童日
千年調蔗庵小閣名曰卮言
錢塘湖春行
前者唱於而隨者唱喁
檣櫓灰飛煙滅
且彼有駭形而無損心
