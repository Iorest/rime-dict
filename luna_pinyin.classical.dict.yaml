陶冶亦以其械器易粟者
特犯人之形而猶喜之
提壺脫褲催歸去
天地所以能長且久者
天地無爲也而無不爲也
天地之平而道德之至也
田禾一睹我而齊國之衆三賀之
天機不張而五官皆備
天下奮柄而不與之偕
天下將安其性命之情
天下將不安其性命之情
天下均治而有虞氏治之邪
天下莫不奔命於仁義
天下莫不以物易其性矣
