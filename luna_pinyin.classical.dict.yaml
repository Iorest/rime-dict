始也我以女爲聖人邪
始也吾以南面而君天下
是以臣盡節於陛下之日長
使異乎我與若者正之
是以就極刑而無慍色
是以君子終日行不離輜重
是以上不敢爲仁義之操
是以聖人抱一爲天下式
